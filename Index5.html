<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spreadsheet Data Siswa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fa;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            padding: 30px 28px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #0b2b4a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge-count {
            background: #dbeafe;
            color: #1a4b7a;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #5b6f82;
            padding: 8px 16px;
            background: #f8fafc;
            border-radius: 30px;
            border: 1px solid #e9edf4;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online {
            background: #22c55e;
        }

        .status-dot.offline {
            background: #ef4444;
        }

        .subtitle {
            color: #5b6f82;
            font-size: 15px;
            margin-bottom: 28px;
            border-left: 4px solid #3b82f6;
            padding-left: 14px;
            background: #f0f4fe;
            border-radius: 0 12px 12px 0;
            line-height: 1.4;
            padding: 10px 16px;
            word-break: break-all;
        }

        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 18px;
            background: #f9fcff;
            padding: 20px 22px;
            border-radius: 20px;
            border: 1px solid #e9edf4;
            margin-bottom: 30px;
            align-items: flex-end;
        }

        .form-group {
            flex: 1 0 160px;
            min-width: 140px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1f3a57;
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d6dee9;
            border-radius: 14px;
            font-size: 15px;
            background: white;
            transition: 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
            flex: 1 0 100%;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #1a4b7a;
            color: white;
            box-shadow: 0 4px 8px rgba(26, 75, 122, 0.2);
        }
        .btn-primary:hover:not(:disabled) {
            background: #0f3a60;
            transform: scale(1.01);
        }

        .btn-success {
            background: #0f7b3a;
            color: white;
            box-shadow: 0 4px 8px rgba(15, 123, 58, 0.2);
        }
        .btn-success:hover:not(:disabled) {
            background: #0b642f;
        }

        .btn-danger {
            background: #b91c1c;
            color: white;
        }
        .btn-danger:hover:not(:disabled) {
            background: #991515;
        }

        .btn-warning {
            background: #b45309;
            color: white;
        }
        .btn-warning:hover:not(:disabled) {
            background: #92400e;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #bcc9db;
            color: #1f3a57;
        }
        .btn-outline:hover:not(:disabled) {
            background: #e6edf6;
        }

        .btn-refresh {
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            font-size: 13px;
        }
        .btn-refresh:hover:not(:disabled) {
            background: #2563eb;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 18px;
            border: 1px solid #e2e9f2;
            background: white;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
            min-width: 500px;
        }

        th {
            background: #f1f6fd;
            color: #1f3a57;
            font-weight: 600;
            padding: 16px 12px;
            text-align: left;
            border-bottom: 2px solid #d6e0ec;
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid #e9eff6;
            color: #1e2f40;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #fafcff;
        }

        .action-icons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-icons button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: 0.1s;
            line-height: 1;
        }

        .action-icons .edit-btn {
            color: #2563eb;
        }
        .action-icons .edit-btn:hover {
            background: #dbeafe;
        }
        .action-icons .delete-btn {
            color: #b91c1c;
        }
        .action-icons .delete-btn:hover {
            background: #fee2e2;
        }

        .empty-row td {
            text-align: center;
            color: #7b8da0;
            padding: 40px 12px;
            font-style: italic;
        }

        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .footer-left {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .footer-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-box {
            background: white;
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a4b7a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f3a57;
            color: white;
            padding: 14px 24px;
            border-radius: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2000;
            max-width: 90%;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #0f7b3a;
        }

        .toast.error {
            background: #b91c1c;
        }

        @media (max-width: 600px) {
            .app-container {
                padding: 20px 14px;
            }
            .form-grid {
                padding: 16px;
                flex-direction: column;
            }
            .form-group {
                flex: 1 1 100%;
                min-width: 0;
            }
            .btn-group .btn {
                flex: 1 1 100%;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .status-bar {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1>
                📊 Data Siswa
                <span class="badge-count" id="rowCount">0</span>
            </h1>
            <div class="status-bar">
                <span class="status-dot online" id="statusDot"></span>
                <span id="statusText">Terhubung ke Google Sheets</span>
                <button class="btn btn-refresh" id="btnRefresh">🔄 Refresh</button>
            </div>
        </div>

        <div class="subtitle">
            ⚡ Data tersimpan otomatis di Google Sheets — 
            <span id="sheetInfo">https://script.google.com/macros/s/AKfycbxH5zvH3DsuLJrzwQFEEpewgUPKlh2tq3NfRlg26hKlifTLM6rk-iyZLckfQPRJw54JfQ/exec</span>
        </div>

        <!-- FORM INPUT -->
        <div class="form-grid" id="formInput">
            <div class="form-group">
                <label for="namaInput">Nama Lengkap</label>
                <input type="text" id="namaInput" placeholder="contoh: Ahmad Fauzi" />
            </div>
            <div class="form-group">
                <label for="kelasInput">Kelas</label>
                <input type="text" id="kelasInput" placeholder="contoh: XII IPA 3" />
            </div>
            <div class="form-group">
                <label for="alamatInput">Alamat</label>
                <input type="text" id="alamatInput" placeholder="contoh: Jl. Merdeka No. 12" />
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="btnTambah">➕ Tambah</button>
                <button class="btn btn-success" id="btnSimpanPerubahan" style="display:none;">💾 Simpan Perubahan</button>
                <button class="btn btn-outline" id="btnBatalEdit" style="display:none;">↩️ Batal Edit</button>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-wrapper">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th style="width:5%">#</th>
                        <th style="width:28%">Nama</th>
                        <th style="width:20%">Kelas</th>
                        <th style="width:32%">Alamat</th>
                        <th style="width:15%">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row">
                        <td colspan="5">📭 Memuat data...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- FOOTER -->
        <div class="footer-actions">
            <div class="footer-left">
                <button class="btn btn-warning" id="btnResetContoh">📥 Muat Contoh</button>
            </div>
            <div class="footer-right">
                <button class="btn btn-danger" id="btnHapusSemua">🗑️ Hapus Semua</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <p id="loadingText">Menyimpan data...</p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            'use strict';

            // ==================== KONFIGURASI ====================
            // Ganti dengan URL Web App Google Apps Script Anda
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxH5zvH3DsuLJrzwQFEEpewgUPKlh2tq3NfRlg26hKlifTLM6rk-iyZLckfQPRJw54JfQ/exec';

            // ==================== STATE ====================
            let dataSiswa = [];
            let editingId = null;
            let isEditMode = false;
            let editingRowIndex = null;

            // DOM elements
            const tbody = document.getElementById('tableBody');
            const rowCount = document.getElementById('rowCount');
            const sheetInfo = document.getElementById('sheetInfo');

            const namaInput = document.getElementById('namaInput');
            const kelasInput = document.getElementById('kelasInput');
            const alamatInput = document.getElementById('alamatInput');

            const btnTambah = document.getElementById('btnTambah');
            const btnSimpanPerubahan = document.getElementById('btnSimpanPerubahan');
            const btnBatalEdit = document.getElementById('btnBatalEdit');
            const btnHapusSemua = document.getElementById('btnHapusSemua');
            const btnResetContoh = document.getElementById('btnResetContoh');
            const btnRefresh = document.getElementById('btnRefresh');

            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const toast = document.getElementById('toast');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            let toastTimeout = null;

            // ==================== API CALL ====================
            async function callAPI(action, params = {}) {
                try {
                    const url = new URL(SCRIPT_URL);
                    // Untuk GET request (getData)
                    if (action === 'getData') {
                        const response = await fetch(url);
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const result = await response.json();
                        return result;
                    }
                    
                    // Untuk POST request (tambah, update, delete, dll)
                    const formData = new FormData();
                    formData.append('action', action);
                    for (const key in params) {
                        if (params[key] !== undefined && params[key] !== null) {
                            formData.append(key, params[key]);
                        }
                    }

                    const response = await fetch(url, {
                        method: 'POST',
                        mode: 'no-cors', // Karena Apps Script tidak mendukung CORS
                        body: formData
                    });

                    // Karena mode no-cors, response tidak bisa dibaca
                    // Kita asumsikan sukses jika tidak error
                    return { success: true };
                } catch (error) {
                    console.error('API Error:', error);
                    throw error;
                }
            }

            // ==================== CRUD OPERATIONS ====================
            async function loadData() {
                try {
                    showLoading('Memuat data...');
                    const result = await callAPI('getData');
                    if (result && result.data) {
                        dataSiswa = result.data;
                    } else if (Array.isArray(result)) {
                        dataSiswa = result;
                    } else {
                        dataSiswa = [];
                    }
                    renderTable();
                    updateStatus(true);
                    hideLoading();
                    showToast('Data berhasil dimuat', 'success');
                } catch (error) {
                    console.error('Error loadData:', error);
                    updateStatus(false);
                    hideLoading();
                    showToast('Gagal memuat data: ' + error.message, 'error');
                    // Tampilkan data dummy untuk demo jika gagal
                    dataSiswa = [
                        { id: 1, nama: 'Andi Pratama', kelas: 'XII IPA 1', alamat: 'Jl. Cendana 8, Jakarta' },
                        { id: 2, nama: 'Budi Santoso', kelas: 'XI IPS 2', alamat: 'Jl. Mawar 15, Bandung' }
                    ];
                    renderTable();
                }
            }

            async function addSiswa() {
                const nama = namaInput.value.trim();
                const kelas = kelasInput.value.trim();
                const alamat = alamatInput.value.trim();

                if (!nama || !kelas || !alamat) {
                    showToast('Semua field harus diisi!', 'error');
                    return;
                }

                try {
                    showLoading('Menambahkan data...');
                    await callAPI('addData', { nama, kelas, alamat });
                    await loadData();
                    resetForm();
                    showToast('Data berhasil ditambahkan', 'success');
                } catch (error) {
                    console.error('Error addSiswa:', error);
                    showToast('Gagal menambahkan data: ' + error.message, 'error');
                } finally {
                    hideLoading();
                }
            }

            async function updateSiswa(rowIndex) {
                const nama = namaInput.value.trim();
                const kelas = kelasInput.value.trim();
                const alamat = alamatInput.value.trim();

                if (!nama || !kelas || !alamat) {
                    showToast('Semua field harus diisi!', 'error');
                    return;
                }

                try {
                    showLoading('Menyimpan perubahan...');
                    await callAPI('updateData', { rowIndex, nama, kelas, alamat });
                    await loadData();
                    resetForm();
                    showToast('Data berhasil diupdate', 'success');
                } catch (error) {
                    console.error('Error updateSiswa:', error);
                    showToast('Gagal mengupdate data: ' + error.message, 'error');
                } finally {
                    hideLoading();
                }
            }

            async function deleteSiswa(rowIndex) {
                if (!confirm('Yakin ingin menghapus data ini?')) return;

                try {
                    showLoading('Menghapus data...');
                    await callAPI('deleteData', { rowIndex });
                    await loadData();
                    if (editingId !== null) resetForm();
                    showToast('Data berhasil dihapus', 'success');
                } catch (error) {
                    console.error('Error deleteSiswa:', error);
                    showToast('Gagal menghapus data: ' + error.message, 'error');
                } finally {
                    hideLoading();
                }
            }

            async function deleteAllSiswa() {
                if (dataSiswa.length === 0) {
                    showToast('Data sudah kosong', 'error');
                    return;
                }
                if (!confirm('Hapus SEMUA data siswa? Aksi ini tidak bisa dibatalkan.')) return;

                try {
                    showLoading('Menghapus semua data...');
                    await callAPI('deleteAllData');
                    await loadData();
                    resetForm();
                    showToast('Semua data berhasil dihapus', 'success');
                } catch (error) {
                    console.error('Error deleteAllSiswa:', error);
                    showToast('Gagal menghapus data: ' + error.message, 'error');
                } finally {
                    hideLoading();
                }
            }

            async function loadExample() {
                if (dataSiswa.length > 0) {
                    if (!confirm('Muat data contoh akan mengganti data saat ini. Lanjutkan?')) return;
                }

                try {
                    showLoading('Memuat data contoh...');
                    await callAPI('loadExampleData');
                    await loadData();
                    resetForm();
                    showToast('Data contoh berhasil dimuat', 'success');
                } catch (error) {
                    console.error('Error loadExample:', error);
                    showToast('Gagal memuat data contoh: ' + error.message, 'error');
                } finally {
                    hideLoading();
                }
            }

            // ==================== UI HELPERS ====================
            function renderTable() {
                if (!dataSiswa || dataSiswa.length === 0) {
                    tbody.innerHTML = `
                        <tr class="empty-row">
                            <td colspan="5">📭 Tidak ada data. Silakan tambahkan siswa.</td>
                        </tr>
                    `;
                    rowCount.textContent = '0';
                    return;
                }

                let html = '';
                dataSiswa.forEach((siswa, index) => {
                    const rowNum = index + 1;
                    const rowIndex = siswa.rowIndex || siswa.id || (index + 2);
                    html += `
                        <tr data-id="${siswa.id || rowIndex}">
                            <td>${rowNum}</td>
                            <td><strong>${escapeHtml(siswa.nama)}</strong></td>
                            <td>${escapeHtml(siswa.kelas)}</td>
                            <td>${escapeHtml(siswa.alamat)}</td>
                            <td>
                                <div class="action-icons">
                                    <button class="edit-btn" data-id="${siswa.id || rowIndex}" data-row="${rowIndex}" title="Edit">✏️</button>
                                    <button class="delete-btn" data-id="${siswa.id || rowIndex}" data-row="${rowIndex}" title="Hapus">🗑️</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
                rowCount.textContent = dataSiswa.length;

                // Event listener untuk tombol edit & hapus
                tbody.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const id = this.dataset.id;
                        const row = parseInt(this.dataset.row, 10);
                        startEdit(id, row);
                    });
                });

                tbody.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const row = parseInt(this.dataset.row, 10);
                        deleteSiswa(row);
                    });
                });
            }

            function escapeHtml(text) {
                if (!text) return '';
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, function(m) { return map[m]; });
            }

            function resetForm() {
                namaInput.value = '';
                kelasInput.value = '';
                alamatInput.value = '';
                editingId = null;
                editingRowIndex = null;
                isEditMode = false;
                btnTambah.style.display = 'inline-flex';
                btnTambah.textContent = '➕ Tambah';
                btnSimpanPerubahan.style.display = 'none';
                btnBatalEdit.style.display = 'none';
                namaInput.focus();
            }

            function startEdit(id, rowIndex) {
                const siswa = dataSiswa.find(s => (s.id == id || s.rowIndex == rowIndex));
                if (!siswa) return;

                editingId = id;
                editingRowIndex = rowIndex;
                isEditMode = true;
                namaInput.value = siswa.nama || '';
                kelasInput.value = siswa.kelas || '';
                alamatInput.value = siswa.alamat || '';

                btnTambah.style.display = 'none';
                btnSimpanPerubahan.style.display = 'inline-flex';
                btnBatalEdit.style.display = 'inline-flex';
                btnSimpanPerubahan.dataset.row = rowIndex;
                namaInput.focus();
            }

            function updateStatus(isOnline) {
                if (isOnline) {
                    statusDot.className = 'status-dot online';
                    statusText.textContent = 'Terhubung ke Google Sheets';
                } else {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = 'Tidak terhubung';
                }
            }

            function showLoading(text = 'Menyimpan data...') {
                loadingText.textContent = text;
                loadingOverlay.style.display = 'flex';
            }

            function hideLoading() {
                loadingOverlay.style.display = 'none';
            }

            function showToast(message, type = 'success') {
                toast.textContent = message;
                toast.className = 'toast ' + type;
                void toast.offsetWidth;
                toast.classList.add('show');

                if (toastTimeout) clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            // ==================== EVENT BINDING ====================
            btnTambah.addEventListener('click', addSiswa);

            btnSimpanPerubahan.addEventListener('click', function(e) {
                if (editingRowIndex !== null) {
                    updateSiswa(editingRowIndex);
                }
            });

            btnBatalEdit.addEventListener('click', function(e) {
                if (isEditMode) {
                    if (confirm('Batalkan edit? Perubahan tidak akan disimpan.')) {
                        resetForm();
                    }
                } else {
                    resetForm();
                }
            });

            btnHapusSemua.addEventListener('click', deleteAllSiswa);
            btnResetContoh.addEventListener('click', loadExample);
            btnRefresh.addEventListener('click', loadData);

            // Enter key support
            document.querySelectorAll('#namaInput, #kelasInput, #alamatInput').forEach(input => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (isEditMode) {
                            btnSimpanPerubahan.click();
                        } else {
                            btnTambah.click();
                        }
                    }
                });
            });

            // ==================== INIT ====================
            sheetInfo.textContent = SCRIPT_URL;

            // Load data pertama kali
            loadData();

            // Auto-refresh setiap 30 detik
            setInterval(() => {
                if (!isEditMode) {
                    loadData();
                }
            }, 30000);

        })();
    </script>
</body>
</html>
